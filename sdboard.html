<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plating Production Dashboard (Compact)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header-gradient { background: linear-gradient(90deg, #0f172a 0%, #1e40af 100%); }
        
        table { table-layout: fixed; width: 100%; height: 1px; } /* height 1px เพื่อให้ flex-grow ทำงานเต็มที่ */
        th, td { 
            padding: 6px 4px !important; 
            line-height: 1.2;
            border: 1px solid #cbd5e1;
        }
        .category-row { height: 2.2rem; background-color: dodgerblue; color: white; }
        .total-row { background-color: #e2e8f0; font-weight: bold; color: #1e293b; }
        .data-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-gradient p-2 text-white flex justify-between items-center shrink-0 shadow-md">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-tight">Electrolytic Plating Production</h1>
                <!---p class="text-xs text-blue-200">Farsonics(Thailand) co.,ltd.</p--->
            </div>
            <div class="text-right">
                <span id="current-date" class="text-lg font-semibold bg-white/10 px-4 py-1 rounded-lg"></span>
            </div>
        </div>

        <div class="flex-grow p-3">
            <table class="bg-white shadow-xl rounded-lg overflow-hidden">
                <thead>
                    <tr class="bg-slate-800 text-white text-xs uppercase">
                        <th rowspan="2" class="w-1/6 text-center">Product Name</th>
                        <th rowspan="2" class="w-12 text-center bg-blue-900/50">งานค้าง<br><span class="text-[9px] font-light">(ยกมา)</span></th>
                        <th colspan="3" class="text-center bg-green-800/40 text-white-900 font-bold">จำนวนรับเข้า</th>
                        <th colspan="2" class="text-center bg-purple-800/40 text-white-900 font-bold">แผนชุบ </th>
                    </tr>
                    <tr class="bg-slate-700 text-white text-[10px]">
                        <th class="w-16 text-center">รอบเช้า</th>
                        <th class="w-16 text-center">รอบบ่าย</th>
                        <th class="w-20 text-center font-bold bg-green-600 text-white">รวมทั้งหมด</th>
                        <th class="w-16 text-center">วันนี้</th>
                        <th class="w-16 text-center italic">พรุ่งนี้</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body" class="text-[13px]">
                    </tbody>
            </table>
        </div>
        
        <div class="bg-slate-200 px-4 py-1 text-[10px] text-slate-500 flex justify-between shrink-0">
            <span>* รวมทั้งหมด = งานค้าง + เช้า + บ่าย</span>
            <span>System Status: Operational</span>
        </div>
    </div>

    <script>
        const categories = [
            {
                name: "SnPure",
                products: ["MTO", "FR", "FG", "TO263-3P", "TO263-7P"]
            },
            {
                name: "SnBi",
                products: ["S1", "D5", "MG031", "UD", "FTO", "MG029", "MG02-001"]
            }
        ];

        function renderDashboard() {
            const tbody = document.getElementById('dashboard-body');
            let html = '';

            categories.forEach(cat => {
                let catSum = { pending: 0, morning: 0, afternoon: 0, grandTotal: 0, planT: 0, planTm: 0 };

                // Header หมวดหมู่
                html += `
                    <tr class="category-row">
                        <td colspan="7" class="px-3 font-bold italic tracking-widest text-xs uppercase">
                            CATEGORY: ${cat.name}
                        </td>
                    </tr>
                `;

                cat.products.forEach(prod => {
                    // ตัวอย่างข้อมูลจำลอง
                    const data = {
                        pending: Math.floor(Math.random() * 20) + 5,
                        morning: Math.floor(Math.random() * 15),
                        afternoon: Math.floor(Math.random() * 15),
                        planToday: 10,
                        planTmr: 30
                    };
                    
                    // 1. คำนวณ "รวม" = งานค้าง + เช้า + บ่าย
                    const grandTotal = data.pending + data.morning + data.afternoon;
                    const planTmr_r = data.planToday - grandTotal;

                    // เก็บยอดรวมหมวด
                    catSum.pending += data.pending;
                    catSum.morning += data.morning;
                    catSum.afternoon += data.afternoon;
                    catSum.grandTotal += grandTotal;
                    catSum.planT += data.planToday;
                    catSum.planTm += planTmr_r;

                    html += `
                        <tr class="data-row border-b border-slate-100 transition-colors">
                            <td class="pl-4 font-semibold text-slate-700">${prod}</td>
                            <td class="text-center font-bold text-blue-700 bg-blue-50/30">${data.pending}</td>
                            <td class="text-center">${data.morning}</td>
                            <td class="text-center">${data.afternoon}</td>
                            <td class="text-center font-bold bg-green-50 text-green-700 text-sm">${grandTotal}</td>
                            <td class="text-center text-purple-700 font-medium">${data.planToday}</td>
                            <td class="text-center text-purple-400 italic">${planTmr_r}</td>
                        </tr>
                    `;
                });

                // แถวรวมท้ายหมวด
                html += `
                    <tr class="total-row border-t-2 border-slate-300">
                        <td class="text-right pr-4 text-[11px] uppercase font-bold">Total ${cat.name}</td>
                        <td class="text-center bg-blue-100/50">${catSum.pending}</td>
                        <td class="text-center">${catSum.morning}</td>
                        <td class="text-center">${catSum.afternoon}</td>
                        <td class="text-center bg-green-600 text-white font-bold text-sm">${catSum.grandTotal}</td>
                        <td class="text-center text-purple-900">${catSum.planT}</td>
                        <td class="text-center">${catSum.planTm}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function setDate() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('th-TH', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        setDate();
        renderDashboard();
    </script>
</body>
</html>
